           C55 38, 22 68, 22 108
           C22 135, 35 155, 58 165
           C58 165, 50 185, 38 192
           C38 192, 68 188, 82 178
           C88 180, 94 181, 100 181
           C145 181, 178 151, 178 108
           C178 68, 145 38, 100 38Z"
